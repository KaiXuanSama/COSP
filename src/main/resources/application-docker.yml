spring:
  application:
    name: copilot-ollama-proxy
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SQLITE_URL:jdbc:sqlite:/app/data/admin.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 10
  sql:
    init:
      mode: always

# ===== 服务器端口 =====
server:
  port: ${SERVER_PORT:11434}

admin:
  username: ${ADMIN_USERNAME:root}
  password: ${ADMIN_PASSWORD:root}
  server:
    port: ${ADMIN_SERVER_PORT:80}

# ===== Ollama 伪装版本 =====
ollama:
  version: ${OLLAMA_VERSION:0.6.4}

# ===== 服务商默认模型（数据库为空时的 fallback） =====
mimo:
  default-model: mimo-v2.5-pro

longcat:
  default-model: LongCat-Flash-Chat

sensenova:
  default-model: sensenova-6.7-flash-lite