<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Ollama-Switch</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Crimson+Pro:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #f5f3ee;
            --surface: #ffffff;
            --sidebar: #1a1917;
            --sidebar-hover: #2a2825;
            --accent: #c27a3e;
            --accent-light: rgba(194, 122, 62, 0.08);
            --accent-mid: rgba(194, 122, 62, 0.15);
            --accent-glow: rgba(194, 122, 62, 0.25);
            --text-primary: #1a1917;
            --text-body: #4a4740;
            --text-muted: #9a9590;
            --text-light: #f5f3ee;
            --border: #e8e5de;
            --border-light: #f0ede6;
            --success: #3a8a5c;
            --danger: #b84a4a;
            --warning: #b89a3a;
            --blue: #5a7ab8;
            --radius: 10px;
            --radius-lg: 14px;
            --shadow-sm: 0 1px 3px rgba(26, 25, 23, 0.04);
            --shadow-md: 0 4px 16px rgba(26, 25, 23, 0.06);
            --shadow-lg: 0 12px 40px rgba(26, 25, 23, 0.12);
            --shadow-xl: 0 24px 60px rgba(26, 25, 23, 0.16);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            font-family: 'Crimson Pro', serif;
            font-size: 15px;
            color: var(--text-body);
            background: var(--bg);
            line-height: 1.6;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ── 品牌面板 ── */
        .brand-panel {
            flex: 0 0 48%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 15% 80%, rgba(194, 122, 62, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 20%, rgba(90, 122, 184, 0.06) 0%, transparent 50%),
                var(--sidebar);
            color: var(--text-light);
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            width: 320px;
            height: 320px;
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid rgba(194, 122, 62, 0.12);
            border-radius: 50%;
            animation: spin 70s linear infinite;
        }

        .brand-panel::after {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            border: 1px solid rgba(194, 122, 62, 0.08);
            border-radius: 50%;
            animation: spin 50s linear infinite reverse;
        }

        @keyframes spin {
            from {
                transform: translateY(-50%) rotate(0deg);
            }

            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        .brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .brand-logo svg {
            width: 28px;
            height: 28px;
            color: var(--accent);
        }

        .brand-text {
            flex-shrink: 0;
            margin: auto 0;
        }

        .brand-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 600;
            line-height: 1.2;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .brand-desc {
            font-size: 15.5px;
            font-weight: 300;
            line-height: 1.7;
            color: rgba(245, 243, 238, 0.55);
            max-width: 360px;
        }

        .dot-grid {
            position: absolute;
            bottom: 48px;
            right: 40px;
            display: grid;
            grid-template-columns: repeat(5, 6px);
            gap: 10px;
            z-index: 1;
        }

        .dot-grid span {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.15;
        }

        /* ── 表单面板 ── */
        .form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 56px;
            background: var(--bg);
        }

        .form-header {
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
            animation-delay: 0.1s;
        }

        .form-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .form-header p {
            font-size: 14.5px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* ── 消息提示 ── */
        .message {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            border-radius: var(--radius);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.4s ease forwards;
            animation-delay: 0.15s;
        }

        .message svg {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
        }

        .message.error {
            background: rgba(184, 74, 74, 0.08);
            color: var(--danger);
            border: 1px solid rgba(184, 74, 74, 0.15);
        }

        .message.info {
            background: rgba(90, 122, 184, 0.08);
            color: var(--blue);
            border: 1px solid rgba(90, 122, 184, 0.15);
        }

        .message.success {
            background: rgba(58, 138, 92, 0.08);
            color: var(--success);
            border: 1px solid rgba(58, 138, 92, 0.15);
        }

        /* ── 表单字段 ── */
        .field-group {
            position: relative;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }

        .field-group:nth-child(1) {
            animation-delay: 0.20s;
        }

        .field-group:nth-child(2) {
            animation-delay: 0.28s;
        }

        .field-label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.25s ease;
        }

        .field-input {
            width: 100%;
            font-family: 'Crimson Pro', serif;
            font-size: 15.5px;
            color: var(--text-primary);
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 13px 14px 13px 44px;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .field-input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        .field-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .field-input:focus~.field-icon {
            color: var(--accent);
        }

        /* ── 表单选项 ── */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
            animation-delay: 0.34s;
        }

        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-input {
            display: none;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 5px;
            background: var(--surface);
            display: grid;
            place-items: center;
            transition: all 0.2s ease;
        }

        .checkbox-input:checked+.checkbox-custom {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox-custom svg {
            width: 12px;
            height: 12px;
            color: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .checkbox-input:checked+.checkbox-custom svg {
            opacity: 1;
        }

        .checkbox-label {
            font-size: 13.5px;
            color: var(--text-muted);
        }

        /* ── 登录按钮 ── */
        .submit-btn {
            position: relative;
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius);
            background: var(--sidebar);
            color: white;
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
            animation-delay: 0.40s;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent), #d4956a);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .submit-btn span {
            position: relative;
            z-index: 1;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .submit-btn:hover::before {
            opacity: 1;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ── 底部提示 ── */
        .form-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
            animation-delay: 0.48s;
        }

        /* ── 动画 ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── 响应式 ── */
        @media (max-width: 1024px) {
            .brand-panel {
                flex: 0 0 42%;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .brand-panel {
                flex: none;
                padding: 32px 24px 24px;
            }

            .brand-tagline {
                font-size: 28px;
            }

            .brand-desc,
            .dot-grid,
            .brand-panel::before,
            .brand-panel::after {
                display: none;
            }

            .form-panel {
                padding: 32px 24px;
                justify-content: flex-start;
            }

            .form-header h1 {
                font-size: 26px;
            }
        }

        @media (max-width: 400px) {
            .form-panel {
                padding: 24px 20px;
            }

            .form-header h1 {
                font-size: 23px;
            }

            .form-options {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <!-- 品牌面板 -->
    <section class="brand-panel">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
            </svg>
            Ollama-Switch
        </div>
        <div class="brand-text">
            <h2 class="brand-tagline">管理后台</h2>
            <p class="brand-desc">
                Ollama 接外界 API 太麻烦？<br>
                来试试Ollama Switch吧！真正的开箱即用！
            </p>
        </div>
        <div class="dot-grid">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </section>

    <!-- 表单面板 -->
    <section class="form-panel">
        <div class="form-header">
            <h1>欢迎回来</h1>
            <p>请输入管理员账号密码以访问配置页面。</p>
        </div>

        <div class="message info" th:if="${param.unauthorized}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span>无权限，请先登录。</span>
        </div>
        <div class="message error" th:if="${param.error}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="15" y1="9" x2="9" y2="15" />
                <line x1="9" y1="9" x2="15" y2="15" />
            </svg>
            <span>用户名或密码错误，请重新输入。</span>
        </div>
        <div class="message success" th:if="${param.logout}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            <span>已退出登录。</span>
        </div>

        <form class="login-form" th:action="@{/login}" method="post">
            <div class="field-group">
                <label class="field-label" for="username">用户名</label>
                <div class="field-input-wrap">
                    <input class="field-input" id="username" name="username" type="text" placeholder="请输入用户名"
                        autocomplete="username" required autofocus>
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">密码</label>
                <div class="field-input-wrap">
                    <input class="field-input" id="password" name="password" type="password" placeholder="请输入密码"
                        autocomplete="current-password" required>
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-wrap">
                    <input class="checkbox-input" type="checkbox" name="remember-me">
                    <span class="checkbox-custom">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </span>
                    <span class="checkbox-label">记住我</span>
                </label>
            </div>

            <button class="submit-btn" type="submit">
                <span>登 录</span>
            </button>
        </form>

        <div class="form-footer">
            未登录访问配置页将自动重定向至此
        </div>
    </section>

</body>

</html>
