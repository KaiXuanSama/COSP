<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · COSP</title>
    <link rel="icon" type="image/png" th:href="@{/admin/img/icon.png}" href="/admin/img/icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Crimson+Pro:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/admin/css/admin-common.css}" href="/admin/css/admin-common.css">
    <link rel="stylesheet" th:href="@{/admin/css/admin-login.css}" href="/admin/css/admin-login.css">
</head>

<body>

    <!-- 品牌面板 -->
    <section class="brand-panel">
        <div class="brand-logo">
            <img th:src="@{/admin/img/icon.png}" src="/admin/img/icon.png" alt="COSP" width="28" height="28">
            COSP
        </div>
        <div class="brand-text">
            <h2 class="brand-tagline">管理后台</h2>
            <p class="brand-desc">
                专为 GitHub Copilot 设计的 Ollama 代理中转服务。<br>
                让 Copilot 轻松对接多种 AI 模型！
            </p>
        </div>
        <div class="dot-grid">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </section>

    <!-- 表单面板 -->
    <section class="form-panel">
        <div class="form-header">
            <h1>欢迎回来</h1>
            <p>请输入管理员账号密码以访问配置页面。</p>
        </div>

        <div class="message info" th:if="${param.unauthorized}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span>无权限，请先登录。</span>
        </div>

        <div class="message error" th:if="${param.error}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="15" y1="9" x2="9" y2="15" />
                <line x1="9" y1="9" x2="15" y2="15" />
            </svg>
            <span>用户名或密码错误。</span>
        </div>

        <form class="login-form" th:action="@{/login}" method="post">
            <div class="field-group">
                <label class="field-label" for="username">用户名</label>
                <div class="field-input-wrap">
                    <input class="field-input" id="username" name="username" type="text" placeholder="请输入用户名"
                        autocomplete="username" required autofocus>
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">密码</label>
                <div class="field-input-wrap">
                    <input class="field-input" id="password" name="password" type="password" placeholder="请输入密码"
                        autocomplete="current-password" required>
                    <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-wrap">
                    <input class="checkbox-input" type="checkbox" name="remember-me">
                    <span class="checkbox-custom">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </span>
                    <span class="checkbox-label">记住我</span>
                </label>
            </div>

            <button class="submit-btn" type="submit">
                <span>登 录</span>
            </button>
        </form>

        <div class="form-footer">
            未登录访问配置页将自动重定向至此
        </div>
    </section>

</body>

</html>
