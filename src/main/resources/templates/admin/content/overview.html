<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- ============================================================
     内容片段：概览页 — 管理后台首页统计信息
     使用方式：th:replace="~{admin/content/overview :: overview}"
     ============================================================ -->

<main th:fragment="overview" class="content">
    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-card-top accent"></div>
            <div class="stat-card-label">API 调用总次数</div>
            <div class="stat-card-value" th:text="${totalApiCalls}">0</div>
            <div class="stat-card-desc">自服务启动以来累计</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-top success"></div>
            <div class="stat-card-label">今日 API 调用次数</div>
            <div class="stat-card-value" th:text="${todayApiCalls}">0</div>
            <div class="stat-card-desc">当日 00:00 ~ 23:59</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-top blue"></div>
            <div class="stat-card-label">今日 Token 消耗</div>
            <div class="stat-card-value stat-card-value--sm">
                <span
                    th:text="${#numbers.formatDecimal(todayInputTokens >= 1000 ? todayInputTokens / 1000.0 : todayInputTokens, 1, todayInputTokens >= 1000 ? 1 : 0)}">0</span><span
                    th:if="${todayInputTokens >= 1000}">k</span>
                <span class="stat-card-token-sep">/</span>
                <span
                    th:text="${#numbers.formatDecimal(todayOutputTokens >= 1000 ? todayOutputTokens / 1000.0 : todayOutputTokens, 1, todayOutputTokens >= 1000 ? 1 : 0)}">0</span><span
                    th:if="${todayOutputTokens >= 1000}">k</span>
            </div>
            <div class="stat-card-desc">输入 / 输出</div>
        </div>
    </div>

    <!-- 热力图 -->
    <div class="card heatmap-card">
        <div class="card-title">
            热力图
            <div class="heatmap-mode-switch">
                <span class="heatmap-mode-label" id="heatmap-mode-label">API 调用</span>
                <button class="heatmap-mode-btn" id="heatmap-mode-btn">切换</button>
            </div>
        </div>
        <div class="card-body">
            <div class="heatmap-container" id="heatmap"></div>
            <div class="heatmap-tooltip" id="heatmap-tooltip"></div>
        </div>
    </div>

    <!-- 关于本服务 -->
    <div class="info-card">
        <div class="info-card-title">关于本服务</div>
        <div class="info-list">
            <div class="info-row">
                <span class="info-row-label">项目</span>
                <span class="info-row-value">Copilot Ollama Proxy</span>
            </div>
            <div class="info-row">
                <span class="info-row-label">描述</span>
                <span class="info-row-value">基于 Spring Boot 的 Ollama 代理中间件，支持多 Provider 切换与 API 调用统计</span>
            </div>
            <div class="info-row">
                <span class="info-row-label">技术栈</span>
                <span class="info-row-value">Spring Boot · Spring Security · Thymeleaf · SQLite</span>
            </div>
            <div class="info-row">
                <span class="info-row-label">开源地址</span>
                <span class="info-row-value"><a href="https://github.com/" target="_blank"
                        rel="noopener">GitHub</a></span>
            </div>
            <div class="info-row">
                <span class="info-row-label">作者</span>
                <span class="info-row-value">KaiXuan</span>
            </div>
        </div>
    </div>

    <!-- 数字滚动动画 + 短轮询脚本 -->
    <script>
        (function () {
            var POLL_INTERVAL = 5000;
            var FIRST_ANIM_DURATION = 2000; // 首次动画 2 秒
            var UPDATE_ANIM_DURATION = 800;  // 后续更新 0.8 秒
            var isFirstLoad = true;

            // 当前显示值（用于后续动画的起点）
            var currentValues = {
                totalApiCalls: 0,
                todayApiCalls: 0,
                todayInputTokens: 0,
                todayOutputTokens: 0
            };

            // 首次加载：先将 DOM 中的值重置为 0，避免先显示目标数字
            if (isFirstLoad) {
                var initEls = document.querySelectorAll('.stat-card-value');
                initEls.forEach(function (el) {
                    // 保留 token-sep 结构，只重置数字
                    if (el.classList.contains('stat-card-value--sm')) {
                        el.innerHTML = '0<span class="stat-card-token-sep">/</span>0';
                    } else {
                        el.textContent = '0';
                    }
                });
            }

            function formatTokens(val) {
                if (val >= 1000) { return (val / 1000).toFixed(1) + 'k'; }
                return val.toString();
            }

            function formatNumber(val) {
                return val.toLocaleString('zh-CN');
            }

            // 数字滚动动画：从 start 到 end，持续 duration 毫秒
            function animateNumber(element, start, end, duration, formatter) {
                if (!element) return;
                var startTime = null;
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    var progress = Math.min((timestamp - startTime) / duration, 1);
                    // easeOutCubic 缓动
                    var eased = 1 - Math.pow(1 - progress, 3);
                    var current = Math.round(start + (end - start) * eased);
                    element.textContent = formatter(current);
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        element.textContent = formatter(end);
                    }
                }
                requestAnimationFrame(step);
            }

            // Token 数值动画（带 / 分隔符）
            function animateToken(element, startIn, endIn, startOut, endOut, duration) {
                if (!element) return;
                var startTime = null;
                function step(timestamp) {
                    if (!startTime) startTime = timestamp;
                    var progress = Math.min((timestamp - startTime) / duration, 1);
                    var eased = 1 - Math.pow(1 - progress, 3);
                    var curIn = Math.round(startIn + (endIn - startIn) * eased);
                    var curOut = Math.round(startOut + (endOut - startOut) * eased);
                    element.innerHTML = formatTokens(curIn) + '<span class="stat-card-token-sep">/</span>' + formatTokens(curOut);
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        element.innerHTML = formatTokens(endIn) + '<span class="stat-card-token-sep">/</span>' + formatTokens(endOut);
                    }
                }
                requestAnimationFrame(step);
            }

            function fetchStats() {
                fetch('/config/api/stats')
                    .then(function (r) { return r.json(); })
                    .then(function (d) {
                        var duration = isFirstLoad ? FIRST_ANIM_DURATION : UPDATE_ANIM_DURATION;

                        // 总调用次数
                        var el1 = document.querySelector('.stat-card:nth-child(1) .stat-card-value');
                        animateNumber(el1, currentValues.totalApiCalls, d.totalApiCalls, duration, formatNumber);

                        // 今日调用次数
                        var el2 = document.querySelector('.stat-card:nth-child(2) .stat-card-value');
                        animateNumber(el2, currentValues.todayApiCalls, d.todayApiCalls, duration, formatNumber);

                        // 今日 Token
                        var el3 = document.querySelector('.stat-card:nth-child(3) .stat-card-value');
                        animateToken(el3, currentValues.todayInputTokens, d.todayInputTokens, currentValues.todayOutputTokens, d.todayOutputTokens, duration);

                        // 更新当前值
                        currentValues.totalApiCalls = d.totalApiCalls;
                        currentValues.todayApiCalls = d.todayApiCalls;
                        currentValues.todayInputTokens = d.todayInputTokens;
                        currentValues.todayOutputTokens = d.todayOutputTokens;

                        isFirstLoad = false;
                    })
                    .catch(function () { });

                // 同步更新热力图数据
                fetchHeatmapData();
            }

            // ── 热力图数据更新（短轮询调用） ──
            function fetchHeatmapData() {
                // 如果热力图渲染脚本还未加载完成，跳过
                if (!window.updateHeatmapData) return;
                fetch('/config/api/heatmap?days=360')
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        if (!data || data.length === 0) return;
                        window.updateHeatmapData(data);
                    })
                    .catch(function () { });
            }

            // 立即开始获取数据并与卡片淡入动画并行执行
            fetchStats();

            // 后续轮询
            setInterval(fetchStats, POLL_INTERVAL);
        })();
    </script>

    <!-- 热力图渲染脚本 -->
    <script>
        (function () {
            var container = document.getElementById('heatmap');
            var tooltip = document.getElementById('heatmap-tooltip');
            if (!container) return;

            var CELL = 16;
            var GAP = 4;
            var DAYS = 360;
            var currentMode = 'calls'; // calls | output | input | total
            var hasRippled = false;

            // 四种模式的配置（按切换顺序）
            var MODE_ORDER = ['calls', 'output', 'input', 'total'];
            var MODE_CONFIG = {
                calls: { field: 'callCount', label: '次', display: 'API 调用', colorClass: 'calls' },
                output: { field: 'outputTokens', label: 'token', display: '输出Token', colorClass: 'output' },
                input: { field: 'inputTokens', label: 'token', display: '输入Token', colorClass: 'input' },
                total: { field: null, label: 'token', display: '总Token', colorClass: 'total' }
            };

            function getValue(dd) {
                if (currentMode === 'total') {
                    return (dd.inputTokens || 0) + (dd.outputTokens || 0);
                }
                return dd[MODE_CONFIG[currentMode].field] || 0;
            }

            function getLevel(count, max) {
                if (count === 0) return 0;
                if (max === 0) return 0;
                var ratio = count / max;
                if (ratio <= 0.25) return 1;
                if (ratio <= 0.5) return 2;
                if (ratio <= 0.75) return 3;
                return 4;
            }

            function getDayOfWeek(dateStr) {
                var p = dateStr.split('-');
                return new Date(+p[0], +p[1] - 1, +p[2]).getDay();
            }

            function calcVisibleCols() {
                var w = container.clientWidth - 48 - 24;
                return Math.max(1, Math.floor((w + GAP) / (CELL + GAP)));
            }

            // ── 渲染热力图 ──
            function render() {
                if (!allWeeks.length) return;

                // 计算当前模式下的最大值
                var maxCount = 0;
                for (var i = 0; i < allWeeks.length; i++) {
                    for (var d = 0; d < 7; d++) {
                        var dd = allWeeks[i][d];
                        if (dd) {
                            var v = getValue(dd);
                            if (v > maxCount) maxCount = v;
                        }
                    }
                }

                // 清空旧内容
                while (container.firstChild) {
                    container.removeChild(container.firstChild);
                }
                container.appendChild(tooltip);

                var visibleCols = calcVisibleCols();
                var weeks = allWeeks.slice(Math.max(0, allWeeks.length - visibleCols));

                // 网格区域
                var gridArea = document.createElement('div');
                gridArea.className = 'heatmap-grid-area';

                // 月份标签行
                var monthRow = document.createElement('div');
                monthRow.className = 'heatmap-months';
                var lastMonth = -1, startCol = 0;
                for (var w = 0; w < weeks.length; w++) {
                    var md = null;
                    for (var d = 0; d < weeks[w].length; d++) {
                        if (weeks[w][d]) { md = weeks[w][d].usageDate; break; }
                    }
                    var m = md ? parseInt(md.split('-')[1]) : -1;
                    if (m !== lastMonth) {
                        if (lastMonth !== -1) {
                            var label = document.createElement('span');
                            label.className = 'heatmap-month-label';
                            label.textContent = lastMonth + '月';
                            label.style.width = ((w - startCol) * (CELL + GAP) - GAP) + 'px';
                            label.style.flexShrink = '0';
                            monthRow.appendChild(label);
                        }
                        lastMonth = m;
                        startCol = w;
                    }
                }
                if (lastMonth !== -1) {
                    var label = document.createElement('span');
                    label.className = 'heatmap-month-label';
                    label.textContent = lastMonth + '月';
                    label.style.width = ((weeks.length - startCol) * (CELL + GAP) - GAP) + 'px';
                    label.style.flexShrink = '0';
                    monthRow.appendChild(label);
                }
                gridArea.appendChild(monthRow);

                // 网格列
                var grid = document.createElement('div');
                grid.className = 'heatmap-grid';

                var RIPPLE_DELAY = 25;
                var RIPPLE_DURATION = 400;
                var CARD_FADE_DELAY = 900;
                var modeLabel = MODE_CONFIG[currentMode].label;
                var colorClass = MODE_CONFIG[currentMode].colorClass;

                for (var w = 0; w < weeks.length; w++) {
                    var col = document.createElement('div');
                    col.className = 'heatmap-col';
                    for (var d = 0; d < 7; d++) {
                        var cell = document.createElement('div');
                        var dd = weeks[w][d];
                        if (dd) {
                            var val = getValue(dd);
                            var level = getLevel(val, maxCount);
                            cell.className = 'heatmap-cell heatmap-cell-mode-' + colorClass + ' level-' + level;
                            cell.dataset.date = dd.usageDate;
                            cell.dataset.value = val;
                            cell.dataset.rippleDist = w + (6 - d);
                            (function (dateStr) {
                                cell.addEventListener('mouseenter', function (e) {
                                    var rect = e.target.getBoundingClientRect();
                                    var cRect = container.getBoundingClientRect();
                                    var currentVal = parseInt(e.target.dataset.value) || 0;
                                    var currentLabel = MODE_CONFIG[currentMode].label;
                                    tooltip.textContent = dateStr + ' · ' + currentVal.toLocaleString('zh-CN') + ' ' + currentLabel;
                                    tooltip.style.display = 'block';
                                    tooltip.style.left = (rect.left - cRect.left + rect.width / 2 - tooltip.offsetWidth / 2) + 'px';
                                    tooltip.style.top = (rect.top - cRect.top - tooltip.offsetHeight - 8) + 'px';
                                });
                            })(dd.usageDate);
                            cell.addEventListener('mouseleave', function () { tooltip.style.display = 'none'; });
                        } else {
                            cell.className = 'heatmap-cell level-empty';
                        }
                        col.appendChild(cell);
                    }
                    grid.appendChild(col);
                }
                gridArea.appendChild(grid);

                // 滚动容器
                var scroll = document.createElement('div');
                scroll.className = 'heatmap-scroll';
                var dayLabels = document.createElement('div');
                dayLabels.className = 'heatmap-days';
                ['日', '一', '二', '三', '四', '五', '六'].forEach(function (n) {
                    var s = document.createElement('span');
                    s.className = 'heatmap-day-label';
                    s.textContent = n;
                    dayLabels.appendChild(s);
                });
                scroll.appendChild(dayLabels);
                scroll.appendChild(gridArea);
                container.appendChild(scroll);

                // 涟漪动画
                if (!hasRippled) {
                    hasRippled = true;
                    setTimeout(function () {
                        var cells = container.querySelectorAll('.heatmap-cell[data-ripple-dist]');
                        cells.forEach(function (cell) {
                            var dist = parseInt(cell.dataset.rippleDist);
                            cell.classList.add('heatmap-cell-ripple');
                            cell.style.animationDelay = (dist * RIPPLE_DELAY) + 'ms';
                            var totalDelay = dist * RIPPLE_DELAY + RIPPLE_DURATION;
                            setTimeout(function () {
                                cell.classList.remove('heatmap-cell-ripple');
                                cell.classList.add('heatmap-cell-visible');
                            }, totalDelay + 50);
                        });
                    }, CARD_FADE_DELAY);
                } else {
                    var cells = container.querySelectorAll('.heatmap-cell');
                    cells.forEach(function (cell) {
                        cell.classList.remove('heatmap-cell-ripple');
                        cell.classList.add('heatmap-cell-visible');
                    });
                }
            }

            // ── 切换模式（循环）带翻牌动画 ──
            function switchMode() {
                var idx = MODE_ORDER.indexOf(currentMode);
                var newMode = MODE_ORDER[(idx + 1) % MODE_ORDER.length];
                var newColorClass = MODE_CONFIG[newMode].colorClass;

                // 更新显示文字
                var labelEl = document.getElementById('heatmap-mode-label');
                if (labelEl) labelEl.textContent = MODE_CONFIG[newMode].display;

                // 预计算新模式的最大值
                var newMaxCount = 0;
                for (var i = 0; i < allWeeks.length; i++) {
                    for (var d = 0; d < 7; d++) {
                        var dd = allWeeks[i][d];
                        if (dd) {
                            var v = newMode === 'total'
                                ? (dd.inputTokens || 0) + (dd.outputTokens || 0)
                                : (dd[MODE_CONFIG[newMode].field] || 0);
                            if (v > newMaxCount) newMaxCount = v;
                        }
                    }
                }

                // 获取所有列
                var cols = container.querySelectorAll('.heatmap-col');
                var FLIP_DELAY = 50;
                var FLIP_DURATION = 250;

                cols.forEach(function (col, colIdx) {
                    setTimeout(function () {
                        col.classList.add('flip-forward');

                        // 翻到 90° 时更新数据和颜色
                        setTimeout(function () {
                            var cells = col.querySelectorAll('.heatmap-cell[data-value]');
                            cells.forEach(function (cell) {
                                // 用新模式重新计算该格子的值
                                var dateStr = cell.dataset.date;
                                var newVal = 0;
                                for (var i = 0; i < allWeeks.length; i++) {
                                    for (var d = 0; d < 7; d++) {
                                        var dd = allWeeks[i][d];
                                        if (dd && dd.usageDate === dateStr) {
                                            newVal = newMode === 'total'
                                                ? (dd.inputTokens || 0) + (dd.outputTokens || 0)
                                                : (dd[MODE_CONFIG[newMode].field] || 0);
                                        }
                                    }
                                }
                                cell.dataset.value = newVal;

                                // 更新颜色类和 level
                                var level = getLevel(newVal, newMaxCount);
                                cell.className = 'heatmap-cell heatmap-cell-mode-' + newColorClass
                                    + ' level-' + level + ' heatmap-cell-visible';
                            });
                        }, FLIP_DURATION / 2);

                        setTimeout(function () {
                            col.classList.remove('flip-forward');
                        }, FLIP_DURATION);
                    }, colIdx * FLIP_DELAY);
                });

                currentMode = newMode;
            }

            // ── 绑定切换按钮事件 ──
            document.getElementById('heatmap-mode-btn').addEventListener('click', switchMode);

            // ── 获取数据 ──
            fetch('/config/api/heatmap?days=' + DAYS)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!data || data.length === 0) return;

                    // 按周分组
                    var firstDow = getDayOfWeek(data[0].usageDate);
                    allWeeks = [];
                    var cur = [];
                    for (var i = 0; i < firstDow; i++) cur.push(null);
                    for (var i = 0; i < data.length; i++) {
                        cur.push(data[i]);
                        if (cur.length === 7) { allWeeks.push(cur); cur = []; }
                    }
                    if (cur.length > 0) { while (cur.length < 7) cur.push(null); allWeeks.push(cur); }

                    render();

                    if (window.ResizeObserver) {
                        var ro = new ResizeObserver(function () { render(); });
                        ro.observe(container);
                    } else {
                        window.addEventListener('resize', function () { render(); });
                    }
                })
                .catch(function () { });

            // ── 暴露热力图数据更新函数（供短轮询调用） ──
            window.updateHeatmapData = function (newData) {
                if (!newData || newData.length === 0) return;

                // 重新按周分组
                var firstDow = getDayOfWeek(newData[0].usageDate);
                allWeeks = [];
                var cur = [];
                for (var i = 0; i < firstDow; i++) cur.push(null);
                for (var i = 0; i < newData.length; i++) {
                    cur.push(newData[i]);
                    if (cur.length === 7) { allWeeks.push(cur); cur = []; }
                }
                if (cur.length > 0) { while (cur.length < 7) cur.push(null); allWeeks.push(cur); }

                // 重新渲染（不触发涟漪动画）
                render();
            };
        })();
    </script>
</main>

</html>
