<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- ============================================================
     内容片段：账号修改页 — 修改管理员用户名和密码
     使用方式：th:replace="~{admin/content/account :: account}"
     ============================================================ -->

<main th:fragment="account" class="content">
    <!-- 消息提示 -->
    <div class="message success" th:if="${saveSuccess}">
        <th:block th:replace="~{admin/fragments/icons :: icon-success}"></th:block>
        <span th:text="${saveSuccess}">修改成功。</span>
    </div>
    <div class="message error" th:if="${saveError}">
        <th:block th:replace="~{admin/fragments/icons :: icon-error}"></th:block>
        <span th:text="${saveError}">修改失败，请检查输入。</span>
    </div>

    <!-- 账号修改表单 -->
    <form class="settings-form" th:action="@{/config/account}" method="post">
        <!-- 用户名修改卡片 -->
        <div class="card">
            <div class="card-title">修改用户名</div>
            <div class="card-body">
                <div class="field-group">
                    <label class="field-label" for="newUsername">新用户名</label>
                    <div class="field-input-wrap">
                        <input class="field-input" id="newUsername" name="newUsername" type="text"
                            placeholder="请输入新用户名" th:value="${newUsername}">
                    </div>
                </div>
            </div>
        </div>

        <!-- 密码修改卡片 -->
        <div class="card">
            <div class="card-title">修改密码</div>
            <div class="card-body">
                <div class="field-group">
                    <label class="field-label" for="currentPassword">当前密码</label>
                    <div class="field-input-wrap">
                        <input class="field-input" id="currentPassword" name="currentPassword" type="password"
                            placeholder="请输入当前密码">
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="newPassword">新密码</label>
                    <div class="field-input-wrap">
                        <input class="field-input" id="newPassword" name="newPassword" type="password"
                            placeholder="请输入新密码（至少4位）">
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="confirmPassword">确认新密码</label>
                    <div class="field-input-wrap">
                        <input class="field-input" id="confirmPassword" name="confirmPassword" type="password"
                            placeholder="请再次输入新密码">
                    </div>
                </div>
            </div>
        </div>

        <!-- 提交按钮 -->
        <div class="form-actions">
            <button class="submit-btn" type="submit">
                <span>保存修改</span>
            </button>
        </div>
    </form>
</main>

</html>
