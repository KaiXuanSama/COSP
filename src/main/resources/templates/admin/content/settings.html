<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- ============================================================
     内容片段：配置页 — 管理后台代理配置表单
     使用方式：th:replace="~{admin/content/settings :: settings}"
     数据模型：
       - longcat: Map (providerKey, enabled, baseUrl, apiKey, apiFormat, models)
       - mimo:    Map (同上)
       - models 中每项: Map (modelName, enabled, contextSize, capsTools, capsVision)
     ============================================================ -->

<main th:fragment="settings" class="content">
    <!-- 消息提示（保存成功/失败时显示） -->
    <div class="message success" th:if="${saveSuccess}">
        <th:block th:replace="~{admin/fragments/icons :: icon-success}"></th:block>
        <span>配置已保存。</span>
    </div>
    <div class="message error" th:if="${saveError}">
        <th:block th:replace="~{admin/fragments/icons :: icon-error}"></th:block>
        <span th:text="${saveError}">保存失败，请检查输入。</span>
    </div>

    <!-- 代理配置表单 -->
    <form class="settings-form" th:action="@{/config/settings}" method="post">

        <!-- 运行配置 -->
        <div class="card">
            <div class="card-title">运行配置</div>
            <div class="card-body">
                <div class="field-group">
                    <label class="field-label" for="fakeVersion">伪造版本号</label>
                    <div class="field-input-wrap">
                        <input class="field-input" id="fakeVersion" name="fakeVersion" type="text" placeholder="0.6.4"
                            th:value="${fakeVersion}">
                    </div>
                </div>
            </div>
        </div>

        <!-- 服务商配置 — 折叠面板 -->
        <div class="card">
            <div class="card-title">服务商配置</div>
            <div class="card-body" style="padding:0">

                <!-- LongCat 折叠项 -->
                <div class="accordion">
                    <div class="accordion-header"
                        onclick="this.nextElementSibling.classList.toggle('open');this.classList.toggle('open')">
                        <span class="accordion-title">LongCat</span>
                        <span class="accordion-arrow">&#x25B8;</span>
                    </div>
                    <div class="accordion-body">
                        <div class="accordion-inner">
                            <div class="field-group">
                                <label class="field-label">启用</label>
                                <div class="switch-wrap">
                                    <label class="switch">
                                        <input type="checkbox" name="longcatEnabled" th:checked="${longcat.enabled}">
                                        <span class="switch-slider"></span>
                                    </label>
                                    <span class="switch-tooltip" id="longcat-tooltip"></span>
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label field-label--inline" for="longcatBaseUrl">API URL</label>
                                <span class="field-hint field-hint--inline">只需要输入前缀，比如 https://api.longcat.chat</span>
                                <div class="field-input-wrap">
                                    <input class="field-input" id="longcatBaseUrl" name="longcatBaseUrl" type="url"
                                        placeholder="https://api.longcat.chat" th:value="${longcat.baseUrl}">
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="longcatApiKey">API Key</label>
                                <th:block th:replace="~{admin/fragments/form-fields :: password-field-with-eye(
                                    'longcatApiKey', 'longcatApiKey', '请输入 LongCat API Key', ${longcat.apiKey})}">
                                </th:block>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="longcatApiFormat">API 格式</label>
                                <div class="field-input-wrap field-input-wrap--select">
                                    <select class="field-input field-input--select" id="longcatApiFormat"
                                        name="longcatApiFormat">
                                        <option value="openai" th:selected="${longcat.apiFormat == 'openai'}">OpenAI
                                        </option>
                                        <option value="anthropic" disabled>AnthropicAPI（未适配）</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 模型列表 -->
                            <div class="model-list" id="longcat-models">
                                <div class="model-list-header">
                                    <span class="model-list-title">模型列表</span>
                                    <span class="model-hint">1M = 1024K；1K = 1024，请输入具体数值</span>
                                    <div class="model-list-actions">
                                        <a href="https://longcat.chat/platform/docs/zh/#%E9%99%90%E6%B5%81%E8%A7%84%E5%88%99"
                                            target="_blank" rel="noopener" class="model-doc-link">官方文档</a>
                                        <button type="button" class="btn-add-model" onclick="addModel('longcat')">+
                                            添加模型</button>
                                    </div>
                                </div>
                                <div class="model-list-items">
                                    <div class="model-item" th:each="model, iter : ${longcat.models}">
                                        <label class="model-enabled"><input type="checkbox"
                                                th:name="'longcatModels[' + ${iter.index} + '].enabled'"
                                                th:checked="${model.enabled}"></label>
                                        <input type="text" placeholder="模型名称"
                                            th:name="'longcatModels[' + ${iter.index} + '].name'"
                                            th:value="${model.modelName}">
                                        <input type="number" placeholder="上下文大小" min="0"
                                            th:name="'longcatModels[' + ${iter.index} + '].contextSize'"
                                            th:value="${model.contextSize}">
                                        <div class="model-caps">
                                            <label class="model-cap"><input type="checkbox"
                                                    th:name="'longcatModels[' + ${iter.index} + '].capsTools'"
                                                    th:checked="${model.capsTools}">工具</label>
                                            <label class="model-cap"><input type="checkbox"
                                                    th:name="'longcatModels[' + ${iter.index} + '].capsVision'"
                                                    th:checked="${model.capsVision}">视觉</label>
                                        </div>
                                        <button type="button" class="btn-remove-model"
                                            onclick="this.parentElement.remove(); checkToggle('longcat')">&#x2715;</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MiMo 折叠项 -->
                <div class="accordion">
                    <div class="accordion-header"
                        onclick="this.nextElementSibling.classList.toggle('open');this.classList.toggle('open')">
                        <span class="accordion-title">MiMo</span>
                        <span class="accordion-arrow">&#x25B8;</span>
                    </div>
                    <div class="accordion-body">
                        <div class="accordion-inner">
                            <div class="field-group">
                                <label class="field-label">启用</label>
                                <div class="switch-wrap">
                                    <label class="switch">
                                        <input type="checkbox" name="mimoEnabled" th:checked="${mimo.enabled}">
                                        <span class="switch-slider"></span>
                                    </label>
                                    <span class="switch-tooltip" id="mimo-tooltip"></span>
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label field-label--inline" for="mimoBaseUrl">API URL</label>
                                <span class="field-hint field-hint--inline">只需要输入前缀，比如
                                    https://token-plan-cn.xiaomimimo.com</span>
                                <div class="field-input-wrap">
                                    <input class="field-input" id="mimoBaseUrl" name="mimoBaseUrl" type="url"
                                        placeholder="https://token-plan-cn.xiaomimimo.com/" th:value="${mimo.baseUrl}">
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="mimoApiKey">API Key</label>
                                <th:block th:replace="~{admin/fragments/form-fields :: password-field-with-eye(
                                    'mimoApiKey', 'mimoApiKey', '请输入 MiMo API Key', ${mimo.apiKey})}"></th:block>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="mimoApiFormat">API 格式</label>
                                <div class="field-input-wrap field-input-wrap--select">
                                    <select class="field-input field-input--select" id="mimoApiFormat"
                                        name="mimoApiFormat">
                                        <option value="openai" th:selected="${mimo.apiFormat == 'openai'}">OpenAI（推荐）
                                        </option>
                                        <option value="anthropic" th:selected="${mimo.apiFormat == 'anthropic'}">
                                            AnthropicAPI（有Bug，不推荐使用）</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 模型列表 -->
                            <div class="model-list" id="mimo-models">
                                <div class="model-list-header">
                                    <span class="model-list-title">模型列表</span>
                                    <span class="model-hint">1M = 1024K；1K = 1024，请输入具体数值</span>
                                    <div class="model-list-actions">
                                        <a href="https://platform.xiaomimimo.com/docs/zh-CN/pricing" target="_blank"
                                            rel="noopener" class="model-doc-link">官方文档</a>
                                        <button type="button" class="btn-add-model" onclick="addModel('mimo')">+
                                            添加模型</button>
                                    </div>
                                </div>
                                <div class="model-list-items">
                                    <div class="model-item" th:each="model, iter : ${mimo.models}">
                                        <label class="model-enabled"><input type="checkbox"
                                                th:name="'mimoModels[' + ${iter.index} + '].enabled'"
                                                th:checked="${model.enabled}"></label>
                                        <input type="text" placeholder="模型名称"
                                            th:name="'mimoModels[' + ${iter.index} + '].name'"
                                            th:value="${model.modelName}">
                                        <input type="number" placeholder="上下文大小" min="0"
                                            th:name="'mimoModels[' + ${iter.index} + '].contextSize'"
                                            th:value="${model.contextSize}">
                                        <div class="model-caps">
                                            <label class="model-cap"><input type="checkbox"
                                                    th:name="'mimoModels[' + ${iter.index} + '].capsTools'"
                                                    th:checked="${model.capsTools}">工具</label>
                                            <label class="model-cap"><input type="checkbox"
                                                    th:name="'mimoModels[' + ${iter.index} + '].capsVision'"
                                                    th:checked="${model.capsVision}">视觉</label>
                                        </div>
                                        <button type="button" class="btn-remove-model"
                                            onclick="this.parentElement.remove(); checkToggle('mimo')">&#x2715;</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- 提交按钮 -->
        <div class="form-actions">
            <button class="submit-btn" type="submit">
                <span>保存配置</span>
            </button>
        </div>
    </form>

    <style>
        .accordion {
            border-bottom: 1px solid var(--border);
        }

        .accordion:last-child {
            border-bottom: none;
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .accordion-header:hover {
            background: var(--surface-hover, #f8f9fa);
        }

        .accordion-title {
            font-weight: 500;
            font-size: 14px;
        }

        .accordion-arrow {
            font-size: 12px;
            transition: transform 0.2s;
            color: var(--text-muted);
        }

        .accordion-header.open .accordion-arrow {
            transform: rotate(90deg);
        }

        .accordion-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease;
            padding: 0 24px;
        }

        .accordion-body.open {
            grid-template-rows: 1fr;
            padding: 4px 24px 20px;
        }

        .accordion-body>.accordion-inner {
            overflow: hidden;
        }

        .accordion-inner .field-group {
            margin-bottom: 16px;
        }

        .accordion-inner .field-group:last-child {
            margin-bottom: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .switch-slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }

        .switch input:checked+.switch-slider {
            background: var(--accent, #4f46e5);
        }

        .switch input:disabled+.switch-slider {
            background: #ddd;
            cursor: not-allowed;
        }

        .switch input:checked+.switch-slider::before {
            transform: translateX(18px);
        }

        .model-list {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg, #f8f9fa);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .model-list-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .model-list-title {
            font-weight: 500;
            font-size: 13px;
            color: var(--text-muted);
        }

        .model-list-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .model-doc-link {
            font-size: 12px;
            color: #2563eb;
            text-decoration: none;
        }

        .model-doc-link:hover {
            text-decoration: underline;
        }

        .btn-add-model {
            font-size: 12px;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            cursor: pointer;
            color: var(--text);
            transition: background 0.15s;
        }

        .btn-add-model:hover {
            background: var(--surface-hover, #f0f0f0);
        }

        .model-list-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .model-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
        }

        .model-enabled {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }

        .model-enabled input {
            accent-color: var(--accent, #4f46e5);
            width: 16px;
            height: 16px;
        }

        .model-item input[type="text"],
        .model-item input[type="number"] {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            background: var(--bg, #fff);
            color: var(--text);
        }

        .model-item input::placeholder {
            color: var(--text-muted);
        }

        .model-caps {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .model-cap {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .model-cap input {
            accent-color: var(--accent, #4f46e5);
        }

        .btn-remove-model {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-remove-model:hover {
            background: #fee;
            color: #e53;
        }

        select option:disabled {
            color: #aaa;
        }

        .switch-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .switch-tooltip {
            display: none;
            margin-left: 10px;
            font-size: 12px;
            color: #e53;
            white-space: nowrap;
        }

        .switch-tooltip:not(:empty) {
            display: inline;
        }

        /* ── 字段提示文本 ── */
        .field-hint {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin: -4px 0 8px;
            font-style: italic;
        }

        .field-label--inline {
            display: inline-block;
            margin-bottom: 0;
            margin-right: 8px;
        }

        .field-hint--inline {
            display: inline;
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* ── 模型列表提示 ── */
        .model-hint {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            white-space: nowrap;
            flex-shrink: 0;
        }
    </style>

    <script>
        function addModel(provider) {
            var container = document.getElementById(provider + '-models').querySelector('.model-list-items');
            var idx = container.querySelectorAll('.model-item').length;
            var div = document.createElement('div');
            div.className = 'model-item';
            div.innerHTML =
                '<label class="model-enabled"><input type="checkbox" name="' + provider + 'Models[' + idx + '].enabled" checked /></label>' +
                '<input type="text" name="' + provider + 'Models[' + idx + '].name" placeholder="模型名称" />' +
                '<input type="number" name="' + provider + 'Models[' + idx + '].contextSize" placeholder="上下文大小" min="0" />' +
                '<div class="model-caps">' +
                '<label class="model-cap"><input type="checkbox" name="' + provider + 'Models[' + idx + '].capsTools" />工具</label>' +
                '<label class="model-cap"><input type="checkbox" name="' + provider + 'Models[' + idx + '].capsVision" />视觉</label>' +
                '</div>' +
                '<button type="button" class="btn-remove-model" onclick="this.parentElement.remove(); checkToggle(\'' + provider + '\')">&#x2715;</button>';
            container.appendChild(div);
            checkToggle(provider);
        }

        function checkToggle(provider) {
            var keyInput = document.getElementById(provider + 'ApiKey');
            var toggle = document.querySelector('input[name="' + provider + 'Enabled"]');
            var items = document.getElementById(provider + '-models').querySelectorAll('.model-item');
            var tooltip = document.getElementById(provider + '-tooltip');
            var reasons = [];
            if (!keyInput.value.trim()) reasons.push('请先填写 API Key');
            if (items.length === 0) reasons.push('请至少添加一个模型');
            if (reasons.length > 0) {
                toggle.checked = false;
                toggle.disabled = true;
                tooltip.textContent = reasons.join('，');
                tooltip.style.display = '';
            } else {
                toggle.disabled = false;
                tooltip.style.display = 'none';
            }
        }

        ['longcat', 'mimo'].forEach(function (provider) {
            var keyInput = document.getElementById(provider + 'ApiKey');
            keyInput.addEventListener('input', function () { checkToggle(provider); });
            keyInput.addEventListener('change', function () { checkToggle(provider); });
            checkToggle(provider);
        });

    </script>
</main>
