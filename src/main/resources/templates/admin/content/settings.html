<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- ============================================================
     内容片段：配置页 — 管理后台代理配置表单
     使用方式：th:replace="~{admin/content/settings :: settings}"
     ============================================================ -->

<main th:fragment="settings" class="content">
    <!-- 消息提示（保存成功/失败时显示） -->
    <div class="message success" th:if="${saveSuccess}">
        <th:block th:replace="~{admin/fragments/icons :: icon-success}"></th:block>
        <span>配置已保存。</span>
    </div>
    <div class="message error" th:if="${saveError}">
        <th:block th:replace="~{admin/fragments/icons :: icon-error}"></th:block>
        <span th:text="${saveError}">保存失败，请检查输入。</span>
    </div>

    <!-- 代理配置表单 -->
    <form class="settings-form" th:action="@{/config/settings}" method="post">

        <!-- 服务商配置 — 折叠面板 -->
        <div class="card">
            <div class="card-title">服务商配置</div>
            <div class="card-body" style="padding:0">

                <!-- LongCat 折叠项 -->
                <div class="accordion">
                    <div class="accordion-header"
                        onclick="this.nextElementSibling.classList.toggle('open');this.classList.toggle('open')">
                        <span class="accordion-title">LongCat</span>
                        <span class="accordion-arrow">▸</span>
                    </div>
                    <div class="accordion-body">
                        <div class="accordion-inner">
                            <div class="field-group">
                                <label class="field-label">启用</label>
                                <div class="switch-wrap">
                                    <label class="switch">
                                        <input type="checkbox" name="longcatEnabled" checked>
                                        <span class="switch-slider"></span>
                                    </label>
                                    <span class="switch-tooltip" id="longcat-tooltip"></span>
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="longcatBaseUrl">API URL</label>
                                <div class="field-input-wrap">
                                    <input class="field-input" id="longcatBaseUrl" name="longcatBaseUrl" type="url"
                                        placeholder="https://api.longcat.chat" th:value="${config.longcatBaseUrl}">
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="longcatApiKey">API Key</label>
                                <div class="field-input-wrap">
                                    <input class="field-input" id="longcatApiKey" name="longcatApiKey" type="password"
                                        placeholder="请输入 LongCat API Key" th:value="${config.longcatApiKey}">
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="longcatApiFormat">API 格式</label>
                                <div class="field-input-wrap field-input-wrap--select">
                                    <select class="field-input field-input--select" id="longcatApiFormat"
                                        name="longcatApiFormat">
                                        <option value="openai" selected>OpenAI</option>
                                        <option value="anthropic" disabled>AnthropicAPI（未适配）</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 模型列表 -->
                            <div class="model-list" id="longcat-models">
                                <div class="model-list-header">
                                    <span class="model-list-title">模型列表</span>
                                    <button type="button" class="btn-add-model" onclick="addModel('longcat')">+
                                        添加模型</button>
                                </div>
                                <div class="model-list-items"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MiMo 折叠项 -->
                <div class="accordion">
                    <div class="accordion-header"
                        onclick="this.nextElementSibling.classList.toggle('open');this.classList.toggle('open')">
                        <span class="accordion-title">MiMo</span>
                        <span class="accordion-arrow">▸</span>
                    </div>
                    <div class="accordion-body">
                        <div class="accordion-inner">
                            <div class="field-group">
                                <label class="field-label">启用</label>
                                <div class="switch-wrap">
                                    <label class="switch">
                                        <input type="checkbox" name="mimoEnabled">
                                        <span class="switch-slider"></span>
                                    </label>
                                    <span class="switch-tooltip" id="mimo-tooltip"></span>
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="mimoBaseUrl">API URL</label>
                                <div class="field-input-wrap">
                                    <input class="field-input" id="mimoBaseUrl" name="mimoBaseUrl" type="url"
                                        placeholder="https://token-plan-cn.xiaomimimo.com/"
                                        th:value="${config.mimoBaseUrl}">
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="mimoApiKey">API Key</label>
                                <div class="field-input-wrap">
                                    <input class="field-input" id="mimoApiKey" name="mimoApiKey" type="password"
                                        placeholder="请输入 MiMo API Key" th:value="${config.mimoApiKey}">
                                </div>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="mimoApiFormat">API 格式</label>
                                <div class="field-input-wrap field-input-wrap--select">
                                    <select class="field-input field-input--select" id="mimoApiFormat"
                                        name="mimoApiFormat">
                                        <option value="openai">OpenAI（推荐）</option>
                                        <option value="anthropic">AnthropicAPI（有Bug，不推荐使用）</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 模型列表 -->
                            <div class="model-list" id="mimo-models">
                                <div class="model-list-header">
                                    <span class="model-list-title">模型列表</span>
                                    <button type="button" class="btn-add-model" onclick="addModel('mimo')">+
                                        添加模型</button>
                                </div>
                                <div class="model-list-items"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- 提交按钮 -->
        <div class="form-actions">
            <button class="submit-btn" type="submit">
                <span>保存配置</span>
            </button>
        </div>
    </form>

    <style>
        .accordion {
            border-bottom: 1px solid var(--border);
        }

        .accordion:last-child {
            border-bottom: none;
        }

        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .accordion-header:hover {
            background: var(--surface-hover, #f8f9fa);
        }

        .accordion-title {
            font-weight: 500;
            font-size: 14px;
        }

        .accordion-arrow {
            font-size: 12px;
            transition: transform 0.2s;
            color: var(--text-muted);
        }

        .accordion-header.open .accordion-arrow {
            transform: rotate(90deg);
        }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease;
        }

        .accordion-body.open {
            max-height: 500px;
        }

        .accordion-inner {
            padding: 4px 24px 20px;
        }

        .accordion-inner .field-group {
            margin-bottom: 16px;
        }

        .accordion-inner .field-group:last-child {
            margin-bottom: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-slider {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .switch-slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }

        .switch input:checked+.switch-slider {
            background: var(--accent, #4f46e5);
        }

        .switch input:disabled+.switch-slider {
            background: #ddd;
            cursor: not-allowed;
        }

        .switch input:disabled~.switch-slider::before {
            background: #f5f5f5;
        }

        .switch input:checked+.switch-slider::before {
            transform: translateX(18px);
        }

        /* 模型列表 */
        .model-list {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .model-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .model-list-title {
            font-weight: 500;
            font-size: 13px;
            color: var(--text-muted);
        }

        .btn-add-model {
            font-size: 12px;
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            cursor: pointer;
            color: var(--text);
            transition: background 0.15s;
        }

        .btn-add-model:hover {
            background: var(--surface-hover, #f0f0f0);
        }

        .model-list-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .model-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
        }

        .model-item input[type="text"],
        .model-item input[type="number"] {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            background: var(--bg, #fff);
            color: var(--text);
        }

        .model-item input::placeholder {
            color: var(--text-muted);
        }

        .model-caps {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .model-cap {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .model-cap input {
            accent-color: var(--accent, #4f46e5);
        }

        .btn-remove-model {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-remove-model:hover {
            background: #fee;
            color: #e53;
        }

        select option:disabled {
            color: #aaa;
        }
        .switch-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .switch-tooltip {
            display: none;
            margin-left: 10px;
            font-size: 12px;
            color: #e53;
            white-space: nowrap;
        }
        .switch-tooltip:not(:empty) {
            display: inline;
        }
    </style>

    <script>
        function addModel(provider) {
            var container = document.getElementById(provider + '-models').querySelector('.model-list-items');
            var idx = container.children.length;
            var div = document.createElement('div');
            div.className = 'model-item';
            div.innerHTML =
                '<input type="text" name="' + provider + 'Models[' + idx + '].name" placeholder="模型名称" />' +
                '<input type="number" name="' + provider + 'Models[' + idx + '].contextSize" placeholder="上下文大小" />' +
                '<div class="model-caps">' +
                '<label class="model-cap"><input type="checkbox" name="' + provider + 'Models[' + idx + '].caps" value="tools" />工具</label>' +
                '<label class="model-cap"><input type="checkbox" name="' + provider + 'Models[' + idx + '].caps" value="vision" />视觉</label>' +
                '</div>' +
                '<button type="button" class="btn-remove-model" onclick="this.parentElement.remove(); checkToggle(\'' + provider + '\')">✕</button>';
            container.appendChild(div);
            checkToggle(provider);
        }

        function checkToggle(provider) {
            var keyInput = document.getElementById(provider + 'ApiKey');
            var toggle = document.querySelector('input[name="' + provider + 'Enabled"]');
            var items = document.getElementById(provider + '-models').querySelectorAll('.model-item');
            var tooltip = document.getElementById(provider + '-tooltip');
            var reasons = [];
            if (!keyInput.value.trim()) reasons.push('请先填写 API Key');
            if (items.length === 0) reasons.push('请至少添加一个模型');
            if (reasons.length > 0) {
                toggle.checked = false;
                toggle.disabled = true;
                tooltip.textContent = reasons.join('，');
                tooltip.style.display = '';
            } else {
                toggle.disabled = false;
                tooltip.style.display = 'none';
            }
        }

        ['longcat', 'mimo'].forEach(function(provider) {
            var keyInput = document.getElementById(provider + 'ApiKey');
            keyInput.addEventListener('input', function() { checkToggle(provider); });
            keyInput.addEventListener('change', function() { checkToggle(provider); });
            checkToggle(provider);
        });
    </script>
</main>

</html>
