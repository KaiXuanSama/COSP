<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/fragments :: head(title=${pageTitleFull})}"></head>

<body>
    <!-- 遮罩层 -->
    <th:block th:replace="~{admin/fragments :: sidebar-overlay}"></th:block>

    <!-- 侧边栏 -->
    <th:block th:replace="~{admin/sidebar :: sidebar}"></th:block>

    <!-- 主内容区 -->
    <div class="main">
        <!-- 页头 -->
        <th:block th:replace="~{admin/header :: header(pageTitle=${pageTitle})}"></th:block>

        <!-- 页面内容 — 由子页面注入 -->
        <th:block th:if="${contentPage == 'admin/overview :: overview'}">
            <th:block th:replace="~{admin/overview :: overview}"></th:block>
        </th:block>
        <th:block th:if="${contentPage == 'admin/settings :: settings'}">
            <th:block th:replace="~{admin/settings :: settings}"></th:block>
        </th:block>
        <th:block th:if="${contentPage == 'admin/logs :: logs'}">
            <th:block th:replace="~{admin/logs :: logs}"></th:block>
        </th:block>
        <th:block th:if="${contentPage == 'admin/status :: status'}">
            <th:block th:replace="~{admin/status :: status}"></th:block>
        </th:block>
    </div>

    <!-- 侧边栏 JS -->
    <th:block th:replace="~{admin/fragments :: sidebar-js}"></th:block>
</body>

</html>
