<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- ============================================================
     片段：页面 <head> — CSS 引用 + 字体
     参数：
       title  — 页面 <title> 内容
     使用方式：th:replace="~{admin/fragments/head :: head(title=${pageTitleFull})}"
     ============================================================ -->

<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">管理后台 · COSP</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Crimson+Pro:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/admin/css/admin-common.css}" href="/admin/css/admin-common.css">
    <link rel="stylesheet" th:href="@{/admin/css/admin-layout.css}" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" th:href="@{/admin/css/admin-components.css}" href="/admin/css/admin-components.css">
</th:block>

</html>
