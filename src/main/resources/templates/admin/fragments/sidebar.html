<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- ============================================================
     片段：侧边栏 — 管理后台左侧导航
     使用方式：th:replace="~{admin/fragments/sidebar :: sidebar}"
     ============================================================ -->

<!-- 遮罩层（移动端抽屉时用） -->
<div th:fragment="sidebar-overlay" class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- 侧边栏导航 -->
<aside th:fragment="sidebar" class="sidebar" id="sidebar">
    <!-- 品牌标识 -->
    <div class="sidebar-brand">
        <th:block th:replace="~{admin/fragments/icons :: icon-logo}"></th:block>
        COSP
    </div>

    <!-- 导航菜单 -->
    <nav class="sidebar-nav">
        <!-- 管理分组 -->
        <div class="nav-section-label">管理</div>
        <a class="nav-item" th:classappend="${nav == 'overview' ? 'active' : ''}" href="/config">
            <th:block th:replace="~{admin/fragments/icons :: icon-overview}"></th:block>
            概览
        </a>
        <a class="nav-item" th:classappend="${nav == 'settings' ? 'active' : ''}" href="/config/settings">
            <th:block th:replace="~{admin/fragments/icons :: icon-settings}"></th:block>
            配置
        </a>

    </nav>

    <!-- 底部用户信息 -->
    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="sidebar-avatar" th:text="${#strings.substring(username, 0, 1)}">R</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" th:text="${username}">root</div>
                <div class="sidebar-user-role">管理员</div>
            </div>
            <a class="sidebar-user-edit" href="/config/account" title="修改账号">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </a>
        </div>
    </div>
</aside>

</html>
